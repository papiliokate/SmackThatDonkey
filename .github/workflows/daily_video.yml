name: Daily Video Generation

on:
  schedule:
    - cron: '0 22 * * *' # 4:00 PM CST (22:00 UTC)
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        format: [standard, fail, interactive]
      max-parallel: 1 # Run sequentially to avoid stressing resources

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev ffmpeg
      
      - name: Install Node Dependencies
        run: npm ci

      - name: Generate Video (${{ matrix.format }})
        run: xvfb-run --auto-servernum --server-args="-screen 0 720x1280x24" node scripts/generate_video.js
        env:
          FORMAT: ${{ matrix.format }}

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily_video_${{ matrix.format }}
          path: public/daily_video.mp4
          retention-days: 1

      - name: Trigger Zapier Distribution
        if: success()
        run: |
          CAPTIONS=(
            "Can you smack the donkey in the right order? 🫏 Play free at oops-games-hub.web.app"
            "Only 1% of players memorize this sequence perfectly! Try it free at oops-games-hub.web.app 🍎"
            "Today's Smack That... Daily Challenge! 🐴 Are you smart enough? Play free at oops-games-hub.web.app"
          )
          YOUTUBE_TITLES=(
            "Can You Smack The Sequence? (#Shorts)"
            "Fastest Way To Solve Today's Memory Puzzle (#Gaming)"
            "Daily Donkey Farm Puzzle (#BrainTeaser)"
          )
          R_INDEX=$(( $RANDOM % 3 ))
          CAPTION="${CAPTIONS[$R_INDEX]} #BrainTraining #DailyPuzzle #MemoryGame #"$(date +'%Y%m%d')
          YT_TITLE="${YOUTUBE_TITLES[$R_INDEX]}"
          TS=$(date +'%s')
          
          curl --fail --silent --show-error -X POST -H "Content-Type: application/json" \
          -d "{\"video_url\": \"https://smack-that-donkey.web.app/daily_video.mp4?t=$TS\", \"text\": \"$CAPTION\", \"youtube_title\": \"$YT_TITLE\", \"target_channel\": \"all\"}" \
          https://hooks.zapier.com/hooks/catch/27231889/ujm5mjh/ || exit 1

  deploy-hub:
    runs-on: ubuntu-latest
    needs: generate-video
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
      - name: Install Dependencies
        run: npm ci
      - name: Build Application
        run: npm run build
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting:smack-that-donkey --project go-rabbit-4af82 --token "${{ secrets.FIREBASE_TOKEN }}"
