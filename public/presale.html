<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smack That... - Binge Mode</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Nunito:wght@700;900&display=swap');
      body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      .container {
        position: relative;
        width: 450px;
        height: 850px;
        flex-shrink: 0;
        transform-origin: center center;
        background: linear-gradient(135deg, #FF9F1C, #FFD166);
        color: #C34B4B;
        text-align: center;
        border-radius: 20px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      h1 { font-family: 'Nunito', sans-serif; font-size: 2.5rem; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
      p { font-size: 1.3rem; margin-bottom: 30px; font-weight: 600; line-height: 1.6; }
      .back-btn {
        background: #C34B4B;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2rem;
        border-radius: 15px;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎟️ Binge Puzzles Coming Soon!</h1>
        <p>We're putting the finishing touches on our Binge Mode feature! Soon, you'll be able to purchase additional puzzles to play as much as you want.</p>
        <a href="/" class="back-btn">Return to Game</a>
    </div>
</body>
</html>
